<!DOCTYPE html>
<html>

<head>
<title>AI Price Prediction</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.nav{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
padding:40px;
}

.card{
background:white;
padding:25px;
width:350px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#256628;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}

.loading{
color:#ff9800;
}

.success{
color:#2e7d32;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="nav">
<h1>🤖 AI Price Prediction System</h1>
</div>

<div class="container">

<div class="card">

<h2>Predict Crop Price</h2>

<input
id="product"
placeholder="Tomato">

<input
id="location"
placeholder="Nagpur">

<button onclick="predict()">
Predict Price
</button>

<div
id="result"
class="result">
</div>

</div>

</div>

<script>


async function predict(){

const product =
document.getElementById("product").value.trim()

const location =
document.getElementById("location").value.trim()

const result =
document.getElementById("result")

if(!product || !location){

result.innerText =
"Enter Product and Location"

return

}

result.innerText =
"Predicting..."

try{

let response =
await fetch(
"https://todo-api-production-491d.up.railway.app/predict-price",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
product,
location
})
}
)

let data =
await response.json()

result.innerHTML =
`
Product: ${data.product}<br>
Location: ${data.location}<br>
Predicted Price: ₹${data.predicted_price_per_kg}/kg
`

}

catch(error){

result.innerText =
"API Connection Error"

}

}

</script>


</body>

</html>
