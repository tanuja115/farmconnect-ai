<!DOCTYPE html>
<html>

<head>
<title>My Orders | FarmConnect AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
}

.nav{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.back{
margin:20px;
padding:12px 20px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.title{
font-size:22px;
color:#2e7d32;
margin-bottom:10px;
}

.info{
margin:6px 0;
font-size:16px;
}

/* STATUS STYLE */
.status{
display:inline-block;
padding:8px 16px;
border-radius:20px;
color:white;
font-weight:bold;
margin-top:10px;
}

/* COLORS */
.PENDING{background:#ff9800;}
.ACCEPTED{background:#4caf50;}
.REJECTED{background:#d32f2f;}
.SHIPPED{background:#2196f3;}
.DELIVERED{background:#009688;}
.PACKED{background:#9c27b0;}
.OUT_FOR_DELIVERY{background:#ff5722;}

.empty{
text-align:center;
font-size:20px;
margin-top:80px;
color:gray;
}

</style>

</head>

<body>

<div class="nav">
<h1>📦 My Orders</h1>
<p>Live Order Tracking</p>
</div>

<button class="back" onclick="window.location.href='customerDashboard.html'">⬅ Back to Dashboard</button>

<div id="orders" class="container">
<div class="empty">Loading Orders...</div>
</div>

<script>

async function loadOrders(){
    const container = document.getElementById("orders");
    
    // Safely retrieve the logged in customer's identity context
    let customer = null;
    try {
        customer = JSON.parse(localStorage.getItem("customer"));
    } catch(e) {
        console.error("Failed to parse identity profile context storage token", e);
    }

    if (!customer || !customer.email) {
        container.innerHTML = "<div class='empty'>Please log in to view your account orders.</div>";
        return;
    }

    try {
        // Updated to use relative path and passes customer email filter parameter to the backend route
        const res = await fetch(`/orders?email=${encodeURIComponent(customer.email)}`);
        
        if (!res.ok) {
            throw new Error(`Server status returned: ${res.status}`);
        }

        const orders = await res.json();

        if(!orders || orders.length === 0){
            container.innerHTML = "<div class='empty'>No Orders Found</div>";
            return;
        }

        let html = "";

        // Loop orders safely mapping layout structures
        orders.forEach(order => {
            const statusStr = order.status || "PENDING";
            const normalizedStatusClass = statusStr.toUpperCase().trim().replace(/ /g, "_");
            
            // Map parameters securely pointing to your database record definitions
            const productName = order.product_name || order.product || "Produce Item";
            const orderId = order.id || "N/A";
            const orderQty = order.quantity || 1;
            const totalPrice = order.total_price || order.price || 0;

            html += `
            <div class="card">
                <h2 class="title">🌾 ${productName}</h2>
                <p class="info"><b>Order ID:</b> ${orderId}</p>
                <p class="info"><b>Quantity:</b> ${orderQty} kg</p>
                <p class="info"><b>Total Price:</b> ₹${totalPrice}</p>
                <span class="status ${normalizedStatusClass}">
                    ${statusStr}
                </span>
            </div>
            `;
        });

        container.innerHTML = html;

    } catch(error){
        console.error("Order history fetch cycle execution failure:", error);
        container.innerHTML = "<div class='empty'>Connection error. Failed to dynamically retrieve order lists.</div>";
    }
}

// INITIAL SEED RUN LOAD
loadOrders();

// LIVE BACKGROUND STATUS CHECK REFRESH ITERATOR RUNNING SECURELY EVERY 7 SECONDS
setInterval(loadOrders, 7000);

</script>

</body>
</html>
