<!DOCTYPE html>
<html>
<head>
    <title>Payment | FarmConnect AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:0;
        }

        .header{
            background:#1565c0;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:500px;
            margin:auto;
            margin-top:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:15px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .product-details {
            background: #fcfcfc;
            border-left: 4px solid #1565c0;
            padding: 10px;
            margin: 15px 0;
            border-radius: 4px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }

        .cod{ background:#2e7d32; color:white; }
        .upi{ background:#ff9800; color:white; }
        .razor{ background:#1976d2; color:white; }
    </style>
</head>

<body>

<div class="header">
    <strong>💳 Choose Payment Method</strong>
</div>

<div class="container">

    <div class="card">
        <h3 id="order-amount">Order Amount: Calculating...</h3>
        
        <div id="summary" class="product-details">
            Loading your item details...
        </div>

        <p style="text-align: center; color: #555;">Select your payment option below:</p>

        <button class="cod" onclick="payCOD()">🚚 Cash on Delivery</button>
        <button class="upi" onclick="payUPI()">📱 UPI Payment</button>
        <button class="razor" onclick="payRazorpay()">💰 Razorpay</button>
    </div>

</div>

<script>
// Safely parse selected item context
let product = null;
let customer = null;

try {
    product = JSON.parse(localStorage.getItem("selectedProduct"));
    customer = JSON.parse(localStorage.getItem("customer"));
} catch (e) {
    console.error("Context read error", e);
}

// Redirect back if context breaks or item wasn't selected
if (!product) {
    alert("No item selected for checkout! Returning to shop.");
    window.location.href = "product.html";
} else {
    // Dynamic price tracking logic
    document.getElementById("order-amount").innerText = `Order Amount: ₹${product.price || 0}`;
    document.getElementById("summary").innerHTML = `
        <strong>Item:</strong> ${product.name || 'Produce Item'}<br>
        <strong>Price:</strong> ₹${product.price || 0} / kg<br>
        <strong>Description:</strong> ${product.description || 'Fresh produce' }
    `;
}

async function payCOD(){
    if (!product) return;

    // Build standard payload matching SQLite backend configuration requirements
    const orderPayload = {
        product_id: product.id || null,
        product_name: product.name,
        price: product.price,
        customer_email: customer ? customer.email : "guest@farmconnect.com",
        payment_method: "COD"
    };

    try {
        const res = await fetch("/order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(orderPayload)
        });

        if (!res.ok) {
            throw new Error(`Server returned code: ${res.status}`);
        }

        const data = await res.json();

        if (data.success) {
            alert("Order successfully placed with Cash on Delivery! 🚚");
            // Clear checkout item token
            localStorage.removeItem("selectedProduct");
            // Clean redirect to order tracking list dashboard page
            window.location.href = "customerOrders.html";
        } else {
            alert("Order placement failed: " + (data.message || "Unknown Error"));
        }

    } catch (err) {
        console.error("Checkout submission error:", err);
        alert("Failed to reach server. Please try again.");
    }
}

function payUPI(){
    alert("UPI integrations require merchant validation. Defaulting securely to COD test mode configuration.");
    payCOD();
}

function payRazorpay(){
    alert("Razorpay payment gateway window loading simulated. Processing order processing sequence.");
    payCOD();
}
</script>

</body>
</html>
