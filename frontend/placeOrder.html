<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:0;
        }

        .header{
            background:#1565c0;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:500px;
            margin:auto;
            margin-top:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:15px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .cod{ background:#2e7d32; color:white; }
        .upi{ background:#ff9800; color:white; }
        .razor{ background:#1976d2; color:white; }
    </style>
</head>

<body>

<div class="header">
    💳 Choose Payment Method
</div>

<div class="container">

    <div class="card">
        <h3>Order Amount: ₹500</h3>
        <p>Select payment method below</p>

        <button class="cod" onclick="payCOD()">🚚 Cash on Delivery</button>
        <button class="upi" onclick="payUPI()">📱 UPI Payment</button>
        <button class="razor" onclick="payRazorpay()">💰 Razorpay</button>
    </div>

</div>

<script>
function payCOD(){
    fetch("/payment/cod", {method:"POST"})
    .then(res => res.json())
    .then(data => {
        alert("Order placed with COD 🚚");
        window.location.href="/order_success";
    });
}

function payUPI(){
    window.location.href="/upi_payment";
}

function payRazorpay(){
    window.location.href="/razorpay_payment";
}
</script>

</body>
</html>
