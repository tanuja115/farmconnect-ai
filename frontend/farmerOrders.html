<!DOCTYPE html>
<html>

<head>
<title>Farmer Orders Dashboard | FarmConnect AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
margin:0;
}

.nav{
background:#2e7d32;
color:white;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
margin:5px;
font-weight: bold;
transition: 0.2s;
}

button:hover {
opacity: 0.9;
transform: scale(1.02);
}

.refresh{background:#1565c0;}
.accept{background:#2e7d32;}
.reject{background:#d32f2f;}
.ship{background:#ff9800;}
.deliver{background:#4caf50;}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.status{
padding:6px 10px;
background:#ff9800;
color:white;
border-radius:5px;
font-weight:bold;
}

img{
width:150px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="nav">
<h1>📦 Farmer Orders Dashboard</h1>
</div>

<br>

<button class="refresh" onclick="loadOrders()">🔄 Refresh Orders</button>

<div id="orders"></div>

<script>

// =====================
// LOAD ORDERS
// =====================
async function loadOrders(){
    const ordersDiv = document.getElementById("orders");

    try{
        // Fixed to relative production URL path
        const res = await fetch("/orders");

        if(!res.ok){
            throw new Error(`Server status: ${res.status}`);
        }

        const orders = await res.json();

        if(!Array.isArray(orders) || orders.length === 0){
            ordersDiv.innerHTML = "<h3>No Orders Yet</h3>";
            return;
        }

        let output = "";

        orders.forEach(order => {
            // Protect layout with safe property fallbacks
            const productName = order.product_name || order.product || "Produce Item";
            const customerName = order.customer_name || order.customer_email || "Customer";
            const mobileNum = order.mobile || "N/A";
            const qty = order.quantity || 1;
            const totalPrice = order.total_price || order.price || 0;
            const addressDetails = order.address || "No delivery address specified";
            const orderStatus = order.status || "PENDING";

            output += `
            <div class="card">
                <h2>🌾 ${productName}</h2>
                <p><b>Customer:</b> ${customerName}</p>
                <p><b>Mobile:</b> ${mobileNum}</p>
                <p><b>Quantity:</b> ${qty} kg</p>
                <p><b>Total Price:</b> ₹${totalPrice}</p>
                <p><b>Address:</b><br>${addressDetails}</p>
                <p>
                    <b>Status:</b>
                    <span class="status" id="status-${order.id}">
                        ${orderStatus}
                    </span>
                </p>

                <button class="accept" onclick="updateStatus(${order.id}, 'Accepted')">Accept</button>
                <button class="reject" onclick="updateStatus(${order.id}, 'Rejected')">Reject</button>
                <button class="ship" onclick="updateStatus(${order.id}, 'Shipped')">Shipped</button>
                <button class="deliver" onclick="updateStatus(${order.id}, 'Delivered')">Delivered</button>
            </div>
            `;
        });

        ordersDiv.innerHTML = output;

    }catch(error){
        console.error("Error loading orders:", error);
        ordersDiv.innerHTML = `
        <div class="card" style="border-left: 5px solid #d32f2f;">
            <h3>❌ Unable to Load Orders</h3>
            <p>Please check your network and server connection.</p>
        </div>`;
    }
}


// =====================
// UPDATE STATUS (Accept / Reject / Ship / Deliver)
// =====================
async function updateStatus(id, status){
    if (!id) {
        alert("Invalid Order ID");
        return;
    }

    try{
        // Fixed to relative production URL path
        const res = await fetch(`/update-order/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ status: status })
        });

        if (!res.ok) {
            throw new Error(`Server returned status code: ${res.status}`);
        }

        const data = await res.json();

        if(data.success){
            const statusLabel = document.getElementById("status-" + id);
            if (statusLabel) {
                statusLabel.innerText = status;
            }
            alert(`✅ Order Status Updated to: ${status}`);
            
            // Re-load the dashboard cleanly to reflect changes
            loadOrders();
        } else {
            alert(data.message || "Update Failed");
        }

    }catch(error){
        console.error("Status Update Error:", error);
        alert("❌ Network Error: Could not update order status.");
    }
}

// Auto refresh setup: Initial check, followed by continuous polling cycles
loadOrders();
const refreshInterval = setInterval(loadOrders, 10000); // 10 seconds is safer for background resource savings

</script>

</body>
</html>
