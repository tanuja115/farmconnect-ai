<!DOCTYPE html>
<html>

<head>
<title>Products</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.nav{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

button{
padding:12px;
border:none;
background:#2e7d32;
color:white;
border-radius:8px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="nav">
<h1>🛒 Products</h1>
</div>

<div class="container" id="products">
Loading...
</div>

<script>

async function loadProducts(){
    const container = document.getElementById("products");

    try {
        // Fetch data using relative path
        const res = await fetch("/products");
        
        // Check if server returned a bad status code (e.g., 404 or 500)
        if (!res.ok) {
            throw new Error(`Server returned status: ${res.status}`);
        }

        let data;
        try {
            data = await res.json();
        } catch (jsonError) {
            throw new Error("Failed to parse product data from server.");
        }

        // Validate that data is an array
        if (!Array.isArray(data) || data.length === 0){
            container.innerHTML = "<h2>No Products Available</h2>";
            return;
        }

        let output = "";

        data.forEach(product => {
            // Safe fallback properties to protect against missing database fields
            const pImage = product.image || 'https://via.placeholder.com/250';
            const pName = product.name || 'Unnamed Product';
            const pPrice = product.price !== undefined ? product.price : '0';
            const pQty = product.quantity !== undefined ? product.quantity : '0';
            const pDesc = product.description || "";

            output += `
            <div class="card">
                <img src="${pImage}" alt="${pName}">
                <h2>${pName}</h2>
                <p><b>₹${pPrice}</b></p>
                <p>Quantity : ${pQty} kg</p>
                <p>${pDesc}</p>
                <button onclick='buyProduct(${JSON.stringify(product)})'>
                    Buy Now
                </button>
            </div>
            `;
        });

        container.innerHTML = output;

    } catch(error) {
        console.error("Product Loading Error:", error);
        container.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; color: #c62828;">
                <h2>Unable to Load Products</h2>
                <p>${error.message || "Please check your server connection and try again."}</p>
            </div>
        `;
    }
}

function buyProduct(product){
    if (!product) {
        alert("Error selecting product. Please try again.");
        return;
    }
    
    try {
        localStorage.setItem("selectedProduct", JSON.stringify(product));
        window.location.href = "placeOrder.html";
    } catch (storageError) {
        console.error("Local Storage Error:", storageError);
        alert("Could not process choice. Please ensure cookies/local storage are enabled.");
    }
}

// Initialize on page load
loadProducts();

</script>

</body>

</html>
