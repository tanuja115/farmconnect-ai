<!DOCTYPE html>
<html>

<head>
<title>Products</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.nav{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

button{
padding:12px;
border:none;
background:#2e7d32;
color:white;
border-radius:8px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="nav">
<h1>🛒 Products</h1>
</div>

<div class="container" id="products">
Loading...
</div>

<script>

async function loadProducts(){
    const container = document.getElementById("products");

    try {
        // Updated to use a relative path instead of localhost
        const res = await fetch("/products");
        const data = await res.json();

        if(data.length === 0){
            container.innerHTML = "<h2>No Products Available</h2>";
            return;
        }

        let output = "";

        data.forEach(product => {
            output += `
            <div class="card">
                <img src="${product.image || 'https://via.placeholder.com/250'}">
                <h2>${product.name}</h2>
                <p><b>₹${product.price}</b></p>
                <p>Quantity : ${product.quantity} kg</p>
                <p>${product.description || ""}</p>
                <button onclick='buyProduct(${JSON.stringify(product)})'>
                    Buy Now
                </button>
            </div>
            `;
        });

        container.innerHTML = output;

    } catch(error) {
        console.log(error);
        container.innerHTML = "<h2>Failed to Load Products</h2>";
    }
}

function buyProduct(product){
    localStorage.setItem("selectedProduct", JSON.stringify(product));
    // Fixed destination: Customers go to placeOrder.html to finalize checkout
    window.location.href = "placeOrder.html";
}

loadProducts();

</script>

</body>

</html>
