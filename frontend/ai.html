<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Description Generator | FarmConnect AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        .nav { background: #2e7d32; color: white; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #1b5e20; }
        .result { display: none; margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; line-height: 1.6; border: 1px solid #c8e6c9; }
        .back { background: #1565c0; }
        .back:hover { background: #0d47a1; }
    </style>
</head>
<body>

<div class="nav">
    <h1>🤖 AI Description Generator</h1>
</div>

<div class="container">
    <input type="text" id="productName" placeholder="Enter Product Name">
    <input type="text" id="productType" placeholder="Enter Product Type">

    <button onclick="generateDescription()">Generate Description</button>

    <div class="result" id="output"></div>

    <button class="back" onclick="goBack()">Back To Dashboard</button>
</div>

<script>
    // Initialize productData from localStorage
    let productData = JSON.parse(localStorage.getItem("product")) || {
        product: "", price: 0, quantity: 1, image: "default.jpg"
    };

    // Pre-fill input if data exists
    if(productData.product) {
        document.getElementById("productName").value = productData.product;
    }

    function generateDescription() {
        let product = document.getElementById("productName").value.trim();
        let type = document.getElementById("productType").value.trim();

        if(!product || !type) {
            alert("Please fill all fields");
            return;
        }

        let description = `🌾 ${product} is a fresh and high-quality ${type} supplied directly by farmers. Healthy, reliable and available for customers.`;

        const outputContainer = document.getElementById("output");
        outputContainer.style.display = "block";
        outputContainer.innerHTML = `
            <p id="generatedText">${description}</p>
            <button onclick="saveProduct()" id="saveBtn">Save Product</button>
        `;
    }

    async function saveProduct() {
        const saveBtn = document.getElementById("saveBtn");
        saveBtn.disabled = true;
        saveBtn.innerText = "Saving...";

        const finalPayload = {
            name: document.getElementById("productName").value.trim(),
            price: productData.price || 0,
            quantity: productData.quantity || 1,
            image: productData.image || "default.jpg",
            description: document.getElementById("generatedText").innerText
        };

        try {
            const response = await fetch("https://farmconnect-ai-1.onrender.com/add-product", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(finalPayload)
            });

            const result = await response.json();

            if(response.ok && result.success) {
                alert("Product Added Successfully ✅");
                localStorage.removeItem("product");
                window.location.href = "product.html";
            } else {
                throw new Error(result.message || "Failed to save");
            }
        } catch(err) {
            console.error("Save Error:", err);
            alert("❌ Error: Could not connect to the database.");
            saveBtn.disabled = false;
            saveBtn.innerText = "Save Product";
        }
    }

    function goBack() {
        window.location.href = "farmerDashboard.html";
    }
</script>

</body>
</html>
