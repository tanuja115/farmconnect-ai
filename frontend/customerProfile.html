<!DOCTYPE html>
<html>

<head>

<title>Customer Profile</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.nav{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.card{

max-width:450px;

margin:30px auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:
0 2px 8px rgba(0,0,0,.2);

}

input{

width:100%;

padding:10px;

margin:10px 0;

box-sizing:border-box;

}

button{

width:100%;

padding:12px;

border:none;

background:#1565c0;

color:white;

border-radius:8px;

cursor:pointer;

margin-top:10px;

}

.save{
background:#2e7d32;
}

</style>

</head>

<body>

<div class="nav">

<h1>
👤 Customer Profile
</h1>

</div>

<div class="card">

<input
id="name"
placeholder="Name">

<input
id="email"
placeholder="Email">

<input
id="phone"
placeholder="Phone">

<button
class="save"
onclick="saveProfile()">

Save

</button>

<button
onclick="back()">

Back

</button>

</div>

<script>

let customer =

JSON.parse(
localStorage.getItem(
"customer"
)
)
||
{}

document
.getElementById(
"name"
).value =
customer.name
||
""

document
.getElementById(
"email"
).value =
customer.email
||
""

document
.getElementById(
"phone"
).value =
customer.phone
||
""

function saveProfile(){

const updated = {

name:
document
.getElementById(
"name"
).value,

email:
document
.getElementById(
"email"
).value,

phone:
document
.getElementById(
"phone"
).value

}

localStorage.setItem(
"customer",
JSON.stringify(
updated
)
)

alert(
"Profile Saved ✅"
)

}

function back(){

window.location.href =
"customerDashboard.html"

}

</script>

</body>

</html>
