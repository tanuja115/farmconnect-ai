<!DOCTYPE html>
<html>
<head>
<title>Farmer Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#2e7d32;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#2e7d32;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>👨‍🌾 Farmer Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<p>
New Farmer?
<a href="farmer-register.html">
Register
</a>
</p>

</div>

<script>

function login(){

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("email").value,

password:document.getElementById("password").value

})

})

.then(res=>res.json())

.then(data=>{

alert(data.message);

if(data.success){

window.location.href="farmerDashboard.html";

}

});

}

</script>

</body>
</html>
