<!DOCTYPE html>
<html>

<head>
<title>FarmConnect AI</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

.nav{
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:10px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    margin:5px;
    width:200px;
}

button{
    padding:10px 15px;
    background:#2e7d32;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="nav">
    <h1>🌾 FarmConnect AI</h1>
</div>

<div class="container">

<div class="card">

<h2>Farmer Registration</h2>

<input id="name" placeholder="Enter Name">
<br><br>

<input id="email" placeholder="Enter Email">
<br><br>

<button onclick="register()">Register</button>

</div>

</div>

<script>

async function register(){

let data={
name: document.getElementById("name").value,
email: document.getElementById("email").value
}

let response = await fetch(
"https://todo-api-production-491d.up.railway.app/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
}
)

let result = await response.json()

alert(result.message)

}

</script>

</body>
</html>
