<!DOCTYPE html>
<html>

<head>

<title>Logout</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;

display:flex;

justify-content:center;

align-items:center;

height:100vh;
}

.card{

background:white;

padding:40px;

border-radius:12px;

box-shadow:
0 2px 10px rgba(0,0,0,.2);

text-align:center;

width:320px;

}

h1{
color:#2e7d32;
}

button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

cursor:pointer;

margin-top:10px;

font-size:16px;

}

.logout{
background:#d32f2f;
color:white;
}

.cancel{
background:#2e7d32;
color:white;
}

</style>

</head>

<body>

<div class="card">

<h1>
🚪 Logout
</h1>

<p>
Do you want to logout?
</p>

<button
class="logout"
onclick="logout()">
Logout
</button>

<button
class="cancel"
onclick="goBack()">
Back
</button>

</div>

<script>

function logout(){

// clear all user data

localStorage.removeItem(
"farmer"
)

localStorage.removeItem(
"customer"
)

localStorage.removeItem(
"step"
)

localStorage.removeItem(
"selectedProduct"
)

alert(
"Logout Successful ✅"
)

// redirect home

window.location.replace(
"home.html"
)

}

function goBack(){

history.back()

}

</script>

</body>

</html>
