<!DOCTYPE html>
<html>

<head>

<title>Customer Register | FarmConnect AI</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#2e7d32,
#43a047
);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.card{

width:100%;

max-width:450px;

background:white;

border-radius:25px;

padding:40px;

box-shadow:
0 15px 40px
rgba(0,0,0,.2);

animation:
fade .8s;

}

@keyframes fade{

from{

opacity:0;

transform:
translateY(30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.logo{

font-size:70px;

text-align:center;

}

h1{

text-align:center;

color:#2e7d32;

margin-top:10px;

}

.subtitle{

text-align:center;

color:#777;

margin-bottom:30px;

}

.input-box{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

font-weight:bold;

color:#444;

}

input{

width:100%;

padding:14px;

border:2px solid #ddd;

border-radius:12px;

font-size:16px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#2e7d32;

box-shadow:
0 0 10px
rgba(46,125,50,.2);

}

button{

width:100%;

padding:16px;

border:none;

border-radius:14px;

background:

linear-gradient(
90deg,
#2e7d32,
#43a047
);

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:
scale(1.03);

}

.footer{

text-align:center;

margin-top:20px;

color:#777;

}

.success{

display:none;

margin-top:15px;

padding:12px;

background:#e8f5e9;

color:#2e7d32;

border-radius:10px;

text-align:center;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

🛒

</div>

<h1>Customer Registration</h1>
<p class="subtitle">Register to order fresh products directly from farmers</p>

<div class="input-box">
    <label>Full Name</label>
    <input id="name" placeholder="Enter your name">
</div>

<div class="input-box">
    <label>Email</label>
    <input id="email" type="email" placeholder="Enter email">
</div>

<!-- Added Password Input Field to match Backend Requirements -->
<div class="input-box">
    <label>Password</label>
    <input id="password" type="password" placeholder="Create a password">
</div>

<div class="input-box">
    <label>Mobile Number</label>
    <input id="mobile" placeholder="Enter mobile number">
</div>

<div class="input-box">
    <label>City</label>
    <input id="city" placeholder="Enter city">
</div>

<button onclick="register()">
    Continue Shopping →
</button>

<div id="success" class="success">
    Registration Successful ✅
</div>

<div class="footer">
    FarmConnect AI
</div>


</div>

<script>
function showToast(msg, isSuccess = true){
    let box = document.getElementById("success");
    box.innerText = msg;
    box.style.display = "block";
    if(!isSuccess) {
        box.style.background = "#ffebee";
        box.style.color = "#c62828";
    } else {
        box.style.background = "#e8f5e9";
        box.style.color = "#2e7d32";
    }
}

function register(){
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let city = document.getElementById("city").value.trim();

    if(!name || !email || !password || !mobile || !city){
        alert("Please fill all fields ❗");
        return;
    }

    // Prepare payload matching Flask's expected keys
    let customerData = {
        name: name,
        email: email,
        password: password
    };

    // Make the live API request to your Flask backend
    fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(customerData)
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) {
            // Store local session items for UI reference if needed
            localStorage.setItem("customer", JSON.stringify({name, email, mobile, city}));
            
            showToast(data.message, true);

            // Redirect to customer dashboard page on success
            setTimeout(() => {
                window.location.href = "customerDashboard.html";
            }, 1500);
        } else {
            showToast(data.message, false);
        }
    })
    .catch(err => {
        console.error("Error:", err);
        showToast("Server connection error. Please try again.", false);
    });
}
</script>

</body>

</html>
