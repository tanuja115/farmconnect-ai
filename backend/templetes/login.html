<!DOCTYPE html>
<html>

<head>
    <title>Farmer Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f2f5f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#1565c0;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0d47a1;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            color:#1565c0;
            text-decoration:none;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Farmer Login</h2>

    <form action="/login" method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New Farmer?
        <a href="/farmer_registration">Register Here</a>
    </p>

</div>

</body>
</html>
